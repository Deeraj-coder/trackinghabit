<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ultimate Habit Tracker</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // When GitHub Pages serves a 404, this page redirects to index.html
      // with the original path encoded as a query parameter
      var pathSegmentsToKeep = 1; // Keep '/trackinghabit' prefix
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
